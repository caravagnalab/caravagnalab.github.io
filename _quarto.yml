project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
  pre-render:
    - python3 scripts/build_example_papers.py
    - python3 scripts/build_projects_page.py
    - python3 scripts/build_talks_page.py
    - python3 scripts/build_join_opportunities.py
    - python3 scripts/build_team_page.py
    - python3 scripts/build_software_catalog.py
    - python3 scripts/build_publications_catalog.py
    - python3 scripts/build_featured_research_page.py
  resources:
    - content/images/**
    - assets/papers.json
    - assets/software-catalog.json
    - assets/software-build.json
    - assets/scholar-publications.json
    - content/team/images/**

website:
  title: "Caravagna Lab"
  site-url: "https://caravagnalab.github.io"
  description: "Cancer Data Science Laboratory at the University of Trieste"
  favicon: assets/favicon.svg
  navbar:
    logo: assets/mark.svg
    title: "CARAVAGNA LAB"
    left:
      - text: Research
        menu:
          - href: research.qmd
            text: Overview
          - href: projects.qmd
            text: Projects
      - text: Outputs
        menu:
          - href: publications.qmd
            text: Publications
          - href: software.qmd
            text: Software
      - href: talks.qmd
        text: Talks & Outreach
      - href: people.qmd
        text: Team
    right:
      - href: join.qmd
        text: Join us
      - icon: github
        href: https://github.com/caravagnalab
        aria-label: Caravagna Lab on GitHub
  page-footer:
    left: |
      **Cancer Data Science Laboratory**<br>Computational oncology · Cancer evolution · Machine learning
    center: |
      Department of Mathematics, Informatics and Geosciences<br>Via D. Economo 12/3 · 34123 Trieste · Italy
    right: |
      [![](content/images/units-logo-footer.svg){.footer-units-logo fig-alt="University of Trieste"}](https://www.units.it/)
  search: true
  open-graph: true
  twitter-card: true

format:
  html:
    theme: lux
    css: styles.css
    toc: false
    smooth-scroll: true
    include-in-header:
      text: |
        <meta name="theme-color" content="#15231d">
